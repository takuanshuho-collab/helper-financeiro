# CI — materializa os portões do docs/HARNESS.md §5.
# Gate A (bloqueante): lint + tipos + harness offline com piso de cobertura.
# Gate B (planilhas sem erro de fórmula): entra na Fase 1, junto com tests/test_outputs.
# Gate C (LLM-as-judge): sob demanda, nunca bloqueante (ver HARNESS §4).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate-a:
    name: Gate A (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Instalar uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python }}

      - name: Instalar dependências
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      # Mesmo escopo do pre-commit/portão local (sidecar explícito — antes o
      # CI só o alcançava por seguir imports). Hotfix v2.12.1.
      - name: Tipos (mypy)
        run: uv run mypy core agent guardrails outputs contracts scripts sidecar main.py

      # Catraca de cobertura: só sobe, nunca desce. Fase 1 (testes de outputs,
      # propriedades e recuperação) levou a cobertura real a ~92%.
      - name: Harness offline (pytest + cobertura)
        run: uv run pytest --cov --cov-fail-under=90

  # Gate Front (v2.3, ADR-0009): lint + tipos + build da GUI web (gui_web/).
  # Independente do Gate A; os portões Python seguem inalterados. Não baixa o
  # binário do Electron (não é preciso para lint/typecheck/build).
  gate-front:
    name: Gate Front (gui_web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui_web
    steps:
      - uses: actions/checkout@v7

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui_web/package-lock.json

      - name: Instalar dependências
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Lint (ESLint)
        run: npm run lint

      - name: Tipos (tsc)
        run: npm run typecheck

      - name: Build (Vite + Electron)
        run: npm run build
