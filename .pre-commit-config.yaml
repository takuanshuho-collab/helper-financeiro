# Hooks locais via uv: sem descompasso de versão com o pyproject.toml.
# Instalar:  uv run pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (lint + imports)
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: mypy
        name: mypy (tipos)
        entry: uv run mypy core agent guardrails outputs contracts scripts main.py
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest (harness offline — Gate A)
        # "not ollama": a integração real (minutos, exige modelo) fica fora do
        # hook; rode-a sob demanda com `uv run pytest -m ollama`.
        entry: uv run pytest -q -m "not ollama"
        language: system
        types: [python]
        pass_filenames: false
